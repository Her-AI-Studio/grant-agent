name: Weekly Grant Search

on:
  schedule:
    # Every Monday at 11:00 UTC (7:00 AM Eastern Daylight Time)
    - cron: "0 11 * * 1"
  workflow_dispatch:  # Allow manual trigger for testing

jobs:
  grant-search:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run grant agent
        env:
          ORG_NAME: ${{ secrets.ORG_NAME || 'Her AI Studio' }}
          ORG_MISSION: ${{ secrets.ORG_MISSION }}
          SMTP_HOST: ${{ secrets.SMTP_HOST || 'smtp.gmail.com' }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: python -m agent.main

      - name: Commit and push updated grants data
        run: |
          git config user.name "grant-agent[bot]"
          git config user.email "grant-agent[bot]@users.noreply.github.com"
          git add data/grants.json
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "chore: update grants database [skip ci]"
          git push